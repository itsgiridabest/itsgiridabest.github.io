<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giri - Cybersecurity & Dev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f6f2;
      --surface: #ffffff;
      --text: #111110;
      --muted: #74746d;
      --accent: #1a3a2a;
      --accent-light: #e8f0eb;
      --border: #e2e0d8;
      --tag-bg: #efefeb;
      --danger: #b94b4b;
      --glow: rgba(26, 58, 42, 0.12);
      --nav-h: 64px;
    }

    body.theme-dark {
      --bg: #101413;
      --surface: #171d1b;
      --text: #f3f1e8;
      --muted: #a7ada7;
      --accent: #8dd8ad;
      --accent-light: #21352b;
      --border: #29322f;
      --tag-bg: #222927;
      --danger: #ff8f8f;
      --glow: rgba(141, 216, 173, 0.16);
    }

    html, body { min-height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "DM Sans", sans-serif;
      font-size: 16px;
      font-weight: 300;
      line-height: 1.6;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(circle at 15% 12%, var(--glow), transparent 28%),
        linear-gradient(rgba(26, 58, 42, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26, 58, 42, 0.035) 1px, transparent 1px);
      background-size: auto, 42px 42px, 42px 42px;
      mask-image: linear-gradient(to bottom, #000, transparent 78%);
    }

    button, input, textarea { font: inherit; }
    button, a { -webkit-tap-highlight-color: transparent; }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 300;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5%;
      background: rgba(247, 246, 242, 0.97);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }

    body.theme-dark nav {
      background: rgba(16, 20, 19, 0.95);
    }

    .nav-logo {
      border: 0;
      background: none;
      color: var(--text);
      cursor: pointer;
      font-family: "DM Serif Display", serif;
      font-size: 1.2rem;
      letter-spacing: 0;
    }

    .nav-links {
      display: flex;
      gap: 1.75rem;
      list-style: none;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .nav-links button,
    .mobile-menu button {
      border: 0;
      background: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 400;
      transition: color 0.2s;
    }

    .nav-links button:hover,
    .nav-links button.active {
      color: var(--text);
      font-weight: 500;
    }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      border: 0;
      background: none;
      cursor: pointer;
      padding: 4px;
    }

    .hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--text);
      border-radius: 2px;
      transition: all 0.25s;
    }

    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .mobile-menu {
      display: none;
      position: fixed;
      top: var(--nav-h);
      left: 0;
      right: 0;
      z-index: 299;
      flex-direction: column;
      padding: 1rem 5%;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .mobile-menu.open { display: flex; }
    .mobile-menu button {
      width: 100%;
      padding: 0.85rem 0;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-size: 1rem;
      text-align: left;
    }

    .mobile-menu button:last-child { border-bottom: 0; }

    .page {
      display: none;
      min-height: 100vh;
      padding-top: var(--nav-h);
      animation: pageIn 0.32s ease both;
    }

    .page.active { display: block; }

    @keyframes pageIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      min-height: 42px;
      padding: 0.7rem 1.4rem;
      border: 1px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s;
    }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #0f2418; }
    .btn-ghost { background: transparent; border-color: var(--border); color: var(--text); }
    .btn-ghost:hover { background: var(--surface); }

    .mini-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.38);
      color: var(--text);
      cursor: pointer;
      font-size: 1rem;
    }

    body.theme-dark .mini-action {
      background: rgba(255, 255, 255, 0.04);
    }

    .mini-action:hover {
      border-color: var(--accent);
      background: var(--surface);
    }

    .page-inner {
      width: min(1020px, 90vw);
      margin: 0 auto;
      padding: 3.5rem 0 5rem;
    }

    .page-header {
      display: flex;
      align-items: baseline;
      gap: 1.25rem;
      margin-bottom: 3rem;
      padding-bottom: 1.1rem;
      border-bottom: 2px solid var(--text);
    }

    .page-header h1,
    .hero h1,
    .about-bio h2,
    .scb-title,
    .pr-title,
    .exp-title,
    .contact-big {
      font-family: "DM Serif Display", serif;
      letter-spacing: 0;
    }

    .page-header h1 {
      font-size: clamp(2.2rem, 6vw, 4rem);
      line-height: 1;
    }

    .page-num {
      flex-shrink: 0;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 0.18rem 0.5rem;
      border-radius: 4px;
      background: var(--tag-bg);
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 500;
    }

    #page-home {
      display: none;
      align-items: center;
      padding: var(--nav-h) 5% 0;
    }

    #page-home.active { display: flex; }

    .hero {
      display: flex;
      align-items: center;
      min-height: calc(100vh - var(--nav-h));
      width: 100%;
    }

    .hero-inner { max-width: 820px; padding: 2rem 0; }
    .hero-kpis {
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem;
      margin: -1.7rem 0 2rem;
    }

    .hero-kpi {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      border: 1px solid var(--border);
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.54);
      padding: 0.42rem 0.75rem;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 500;
    }

    body.theme-dark .hero-kpi {
      background: rgba(255, 255, 255, 0.05);
    }

    .hero-kpi strong {
      color: var(--text);
      font-weight: 600;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.75rem;
      padding: 0.28rem 0.7rem;
      border-radius: 99px;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .hero-eyebrow::before {
      content: "";
      display: block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    .hero h1 {
      margin-bottom: 1.25rem;
      font-size: clamp(2.6rem, 7vw, 5.2rem);
      line-height: 1.06;
    }

    .hero h1 em,
    .contact-big em {
      color: var(--accent);
      font-style: italic;
    }

    .hero-sub {
      max-width: 500px;
      margin-bottom: 2rem;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.75;
    }

    .hero-cta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 3rem;
    }

    .home-cards {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.75rem;
      max-width: 820px;
    }

    .home-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      cursor: pointer;
      padding: 1.1rem 1.25rem;
      text-align: left;
      transition: all 0.2s;
    }

    .home-card:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.07);
    }

    .hc-num {
      margin-bottom: 0.4rem;
      color: var(--muted);
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .hc-title {
      font-family: "DM Serif Display", serif;
      font-size: 1rem;
    }

    .hc-arrow {
      margin-top: 0.6rem;
      color: var(--muted);
      font-size: 0.75rem;
    }

    .about-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5rem;
      align-items: start;
    }

    .about-bio h2 {
      margin-bottom: 1.25rem;
      font-size: clamp(1.4rem, 3vw, 2rem);
      line-height: 1.2;
    }

    .about-bio p {
      margin-bottom: 1.1rem;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.9;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.85rem;
      margin-bottom: 2.25rem;
    }

    .stat-card,
    .exp-card,
    .ach-card,
    .exp-explore-item {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
    }

    .stat-card { padding: 1.25rem; }
    .stat-val {
      color: var(--accent);
      font-family: "DM Serif Display", serif;
      font-size: 1.75rem;
    }

    .stat-lbl {
      margin-top: 0.2rem;
      color: var(--muted);
      font-size: 0.75rem;
    }

    .timeline {
      border-left: 2px solid var(--border);
      padding-left: 1.4rem;
    }

    .tl-item {
      position: relative;
      margin-bottom: 1.6rem;
    }

    .tl-item::before {
      content: "";
      position: absolute;
      left: -1.82rem;
      top: 0.35rem;
      width: 8px;
      height: 8px;
      border: 2px solid var(--bg);
      border-radius: 50%;
      background: var(--accent);
    }

    .tl-year {
      margin-bottom: 0.15rem;
      color: var(--accent);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .tl-title {
      font-size: 0.875rem;
      font-weight: 500;
    }

    .tl-desc {
      margin-top: 0.15rem;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.55;
    }

    .project-row {
      display: grid;
      grid-template-columns: 56px 1fr auto;
      align-items: center;
      gap: 1.75rem;
      padding: 1.5rem 0.75rem;
      border-bottom: 1px solid var(--border);
      border-radius: 8px;
      transition: background 0.15s, padding 0.15s;
    }

    .project-row:first-child { border-top: 1px solid var(--border); }
    .project-row:hover { background: var(--surface); padding-left: 1.25rem; }

    .project-toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .project-search {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      padding: 0.68rem 0.85rem;
      outline: none;
    }

    .project-search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }

    .project-filters {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 0.45rem;
    }

    .filter-chip {
      min-height: 34px;
      border: 1px solid var(--border);
      border-radius: 99px;
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      padding: 0.35rem 0.72rem;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .filter-chip.active,
    .filter-chip:hover {
      border-color: var(--accent);
      background: var(--accent-light);
      color: var(--accent);
    }

    .empty-state {
      border: 1px dashed var(--border);
      border-radius: 8px;
      padding: 2rem;
      color: var(--muted);
      text-align: center;
    }

    .pr-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      border-radius: 12px;
      background: var(--accent-light);
      font-size: 1.4rem;
    }

    .pr-title {
      margin-bottom: 0.3rem;
      font-size: 1.35rem;
    }

    .pr-desc {
      max-width: 560px;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.6;
    }

    .pr-tags,
    .exp-tags,
    .scb-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    .pr-tags { margin-top: 0.6rem; }
    .pr-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.5rem;
    }

    .pr-featured,
    .exp-badge {
      border-radius: 4px;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .pr-featured { padding: 0.18rem 0.45rem; }
    .pr-link {
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 500;
      text-decoration: none;
      white-space: nowrap;
    }

    .pr-link:hover { text-decoration: underline; }

    .exp-categories {
      display: flex;
      flex-direction: column;
      gap: 3.5rem;
    }

    .exp-cat-label {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .exp-cat-label::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .exp-card {
      margin-bottom: 1rem;
      padding: 1.75rem 2rem;
      transition: box-shadow 0.2s;
    }

    .exp-card:hover { box-shadow: 0 6px 28px rgba(0, 0, 0, 0.06); }
    .exp-card-top {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }

    .exp-title { font-size: 1.25rem; }
    .exp-badge { padding: 0.22rem 0.55rem; }
    .exp-org {
      margin-bottom: 0.85rem;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 400;
    }

    .exp-bullets {
      padding-left: 1.1rem;
    }

    .exp-bullets li {
      margin-bottom: 0.3rem;
      color: var(--muted);
      font-size: 0.875rem;
      line-height: 1.7;
    }

    .exp-bullets li::marker { color: var(--accent); }
    .exp-tags { margin-top: 1rem; }

    .achievements-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    .ach-card { padding: 1.25rem 1.5rem; }
    .ach-icon { margin-bottom: 0.6rem; font-size: 1.4rem; }
    .ach-title { margin-bottom: 0.2rem; font-size: 0.9rem; font-weight: 500; }
    .ach-sub { color: var(--muted); font-size: 0.78rem; }

    .exploring-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
    }

    .exp-explore-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 1rem 1.25rem;
      color: var(--muted);
      font-size: 0.875rem;
    }

    .exp-explore-item::before {
      content: "->";
      flex-shrink: 0;
      color: var(--accent);
      font-size: 0.8rem;
    }

    .soon {
      margin-left: 0.35rem;
      color: var(--accent);
      font-size: 0.7rem;
    }

    .skills-categories {
      display: flex;
      flex-direction: column;
      gap: 3rem;
    }

    .scb-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .scb-title { font-size: 1.6rem; }
    .scb-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .scb-pills { gap: 0.65rem; }
    .skill-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      min-height: 36px;
      padding: 0.55rem 1rem;
      border: 1px solid var(--border);
      border-radius: 99px;
      background: var(--surface);
      color: var(--text);
      font-size: 0.84rem;
      transition: all 0.2s;
    }

    .skill-pill:hover {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }

    .dot-green { background: #4caf7d; }
    .dot-blue { background: #5e8ac8; }
    .dot-orange { background: #e07b39; }

    #page-contact .page-inner {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: calc(100vh - var(--nav-h));
      max-width: 660px;
    }

    .contact-big {
      margin-bottom: 1.75rem;
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      line-height: 1.3;
    }

    .contact-bio-text {
      margin-bottom: 2.25rem;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.8;
    }

    .contact-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.85rem;
      margin-bottom: 2.5rem;
    }

    .contact-divider {
      height: 1px;
      margin-bottom: 1.25rem;
      background: var(--border);
    }

    .contact-footer-row {
      color: var(--muted);
      font-size: 0.78rem;
    }

    .edit-toggle {
      display: none;
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 650;
      border: 1px solid rgba(255, 255, 255, 0.38);
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.2);
    }

    body.editor-enabled .edit-toggle {
      display: inline-flex;
    }

    .quick-hint {
      position: fixed;
      left: 18px;
      bottom: 18px;
      z-index: 640;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--muted);
      padding: 0.55rem 0.75rem;
      font-size: 0.75rem;
      backdrop-filter: blur(12px);
    }

    body.theme-dark .quick-hint {
      background: rgba(16, 20, 19, 0.82);
    }

    .quick-hint kbd {
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--surface);
      color: var(--text);
      padding: 0.1rem 0.32rem;
      font-size: 0.72rem;
      font-family: inherit;
    }

    .editor-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 700;
      background: rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(4px);
    }

    .editor-panel {
      position: fixed;
      top: 0;
      right: 0;
      z-index: 701;
      display: flex;
      flex-direction: column;
      width: min(560px, 100vw);
      height: 100vh;
      background: #fff;
      box-shadow: -8px 0 40px rgba(0, 0, 0, 0.14);
      transform: translateX(105%);
      transition: transform 0.3s ease;
    }

    body.theme-dark .editor-panel,
    body.theme-dark .editor-foot,
    body.theme-dark .command-panel {
      background: var(--surface);
    }

    .editor-overlay.open { display: block; }
    .editor-panel.open { transform: translateX(0); }

    .command-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 800;
      align-items: flex-start;
      justify-content: center;
      padding: 12vh 1rem 1rem;
      background: rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(4px);
    }

    .command-overlay.open { display: flex; }

    .command-panel {
      width: min(620px, 100%);
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
    }

    .command-input {
      width: 100%;
      border: 0;
      border-bottom: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      padding: 1rem 1.1rem;
      font-size: 1rem;
      outline: none;
    }

    .command-list {
      max-height: 360px;
      overflow-y: auto;
      padding: 0.45rem;
    }

    .command-item {
      display: grid;
      grid-template-columns: 34px 1fr auto;
      gap: 0.75rem;
      align-items: center;
      width: 100%;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      padding: 0.75rem;
      text-align: left;
    }

    .command-item:hover,
    .command-item.active {
      background: var(--accent-light);
    }

    .command-icon {
      color: var(--accent);
      font-size: 1rem;
      text-align: center;
    }

    .command-title {
      font-size: 0.9rem;
      font-weight: 600;

    .command-sub {
      color: var(--muted);

      letter-spacing: 0.08em;

    .editor-head {

      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);

      font-weight: 400;

      height: 36px;

      background: var(--surface);

      font-size: 1.25rem;
      line-height: 1;

      margin-bottom: 1rem;

    .field label,

      display: block;
      margin-bottom: 0.35rem;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;

  <script>
    const storageKey = "giri-portfolio-content-v2";
    const navItems = [
      ["about", "About"],
      ["projects", "Projects"],
      ["experiences", "Experience"],
      ["skills", "Skills"],
      ["contact", "Contact"]
    ];
    const editorTabs = [
      ["basics", "Basics"],
      ["projects", "Projects"],
      ["skills", "Skills"],
      ["json", "All Content"]
    ];

    let content = readInitialContent();
    let currentPage = "home";
    let projectSearch = "";
    let activeProjectTag = "All";
    let commandItems = [];
    let activeCommandIndex = 0;
    let editorEnabled = false;

    function readInitialContent() {
      const saved = localStorage.getItem(storageKey);
      if (saved) {
        try { return JSON.parse(saved); } catch { localStorage.removeItem(storageKey); }
      }
      return JSON.parse(document.getElementById("portfolio-data").textContent);
    }

    function writeStoredContent() {
      localStorage.setItem(storageKey, JSON.stringify(content, null, 2));
      document.getElementById("portfolio-data").textContent = "\n" + JSON.stringify(content, null, 2) + "\n  ";
    }

    function el(tag, className, text) {
      const node = document.createElement(tag);
      if (className) node.className = className;
      if (text !== undefined) node.textContent = text;
      return node;
    }

    function setHtml(id, html) {
      document.getElementById(id).innerHTML = html;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function renderShell() {
      const desktop = document.getElementById("desktop-nav");
      const mobile = document.getElementById("mobile-menu");
      desktop.innerHTML = "";
      mobile.innerHTML = "";

      navItems.forEach(([key, label]) => {
        const li = el("li");
        const button = el("button", "", label);
        button.type = "button";
        button.dataset.nav = key;
        button.id = "nav-" + key;
        li.appendChild(button);
        desktop.appendChild(li);

        const mobileButton = el("button", "", label);
        mobileButton.type = "button";
        mobileButton.dataset.nav = key;
        mobile.appendChild(mobileButton);
      });

      document.querySelectorAll("[data-nav]").forEach((button) => {
        button.addEventListener("click", () => navigate(button.dataset.nav));
      });
    }

    function renderAll() {
      renderHero();
      renderAbout();
      renderProjectFilters();
      renderProjects();
      renderExperience();
      renderSkills();
      renderContact();
      buildCommandItems();
      updateActiveNav();
    }

    function renderHero() {
      document.getElementById("hero-eyebrow").textContent = content.hero.eyebrow;
      setHtml("hero-title", `${escapeHtml(content.hero.title1)}<br><em>${escapeHtml(content.hero.title2)}</em><br>${escapeHtml(content.hero.title3)}`);
      document.getElementById("hero-sub").textContent = content.hero.subtitle;
      const skillsTotal = Object.values(content.skills).reduce((sum, category) => sum + category.items.length, 0);
      setHtml("hero-kpis", `
        <div class="hero-kpi"><strong>${content.projects.length}</strong> projects</div>
        <div class="hero-kpi"><strong>${skillsTotal}</strong> skills/tools</div>
        <div class="hero-kpi"><strong>${content.achievements.length}</strong> achievements</div>
      `);

      const cards = navItems.map(([key, label], index) => `
        <button class="home-card" type="button" data-nav="${key}">
          <div class="hc-num">${String(index + 1).padStart(2, "0")}</div>
          <div class="hc-title">${label}</div>
          <div class="hc-arrow">-></div>
        </button>
      `).join("");
      setHtml("home-cards", cards);
      document.querySelectorAll("#home-cards [data-nav]").forEach((button) => {
        button.addEventListener("click", () => navigate(button.dataset.nav));
      });
    }

    function renderAbout() {
      setHtml("about-heading", escapeHtml(content.about.heading).replace(/\n/g, "<br>"));
      document.getElementById("about-p1").textContent = content.about.p1;
      document.getElementById("about-p2").textContent = content.about.p2;
      setHtml("stats-grid", content.about.stats.map((stat) => `
        <div class="stat-card">
          <div class="stat-val">${escapeHtml(stat.value)}</div>
          <div class="stat-lbl">${escapeHtml(stat.label)}</div>
        </div>
      `).join(""));
      setHtml("timeline", content.about.timeline.map((item) => `
        <div class="tl-item">
          <div class="tl-year">${escapeHtml(item.year)}</div>
          <div class="tl-title">${escapeHtml(item.title)}</div>
          <div class="tl-desc">${escapeHtml(item.desc)}</div>
        </div>
      `).join(""));
    }

    function renderProjects() {
      const query = projectSearch.trim().toLowerCase();
      const projects = content.projects.filter((project) => {
        const haystack = [project.title, project.desc, project.icon, ...(project.tags || [])].join(" ").toLowerCase();
        const matchesSearch = !query || haystack.includes(query);
        const matchesTag = activeProjectTag === "All" || project.tags.includes(activeProjectTag);
        return matchesSearch && matchesTag;
      });

      if (!projects.length) {
        setHtml("projects-list", '<div class="empty-state">No projects match that filter yet.</div>');
        return;
      }

      setHtml("projects-list", projects.map((project) => `
        <div class="project-row">
          <div class="pr-icon">${escapeHtml(project.icon)}</div>
          <div>
            <div class="pr-title">${escapeHtml(project.title)}</div>
            <div class="pr-desc">${escapeHtml(project.desc)}</div>
            <div class="pr-tags">${project.tags.map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}</div>
          </div>
          <div class="pr-right">
            ${project.featured ? '<span class="pr-featured">Featured</span>' : ""}
            <a href="${escapeHtml(project.link)}" class="pr-link">View -></a>
          </div>
        </div>
      `).join(""));
    }

    function renderProjectFilters() {
      const filterWrap = document.getElementById("project-filters");
      if (!filterWrap) return;
      const tags = ["All", ...new Set(content.projects.flatMap((project) => project.tags || []))].slice(0, 9);
      filterWrap.innerHTML = tags.map((tag) => `
        <button class="filter-chip ${tag === activeProjectTag ? "active" : ""}" type="button" data-project-tag="${escapeHtml(tag)}">${escapeHtml(tag)}</button>
      `).join("");
      filterWrap.querySelectorAll("[data-project-tag]").forEach((button) => {
        button.addEventListener("click", () => {
          activeProjectTag = button.dataset.projectTag;
          renderProjectFilters();
          renderProjects();
        });
      });
    }

    function renderExperience() {
      const groups = content.experience.map((group) => `
        <div>
          <div class="exp-cat-label">${escapeHtml(group.label)}</div>
          ${group.items.map((item) => `
            <article class="exp-card">
              <div class="exp-card-top">
                <div class="exp-title">${escapeHtml(item.title)}</div>
                <span class="exp-badge">${escapeHtml(item.badge)}</span>
              </div>
              <div class="exp-org">${escapeHtml(item.org)}</div>
              <ul class="exp-bullets">${item.bullets.map((bullet) => `<li>${escapeHtml(bullet)}</li>`).join("")}</ul>
              <div class="exp-tags">${item.tags.map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}</div>
            </article>
          `).join("")}
        </div>
      `).join("");

      const exploring = `
        <div>
          <div class="exp-cat-label">What I'm Exploring</div>
          <div class="exploring-grid">${content.exploring.map((item) => `<div class="exp-explore-item">${escapeHtml(item)}</div>`).join("")}</div>
        </div>
      `;

      const achievements = `
        <div>
          <div class="exp-cat-label">Achievements</div>
          <div class="achievements-row">${content.achievements.map((item) => `
            <div class="ach-card">
              <div class="ach-icon">${escapeHtml(item.icon)}</div>
              <div class="ach-title">${escapeHtml(item.title)}</div>
              <div class="ach-sub">${escapeHtml(item.sub)}</div>
            </div>
          `).join("")}</div>
        </div>
      `;

      setHtml("experience-list", groups + exploring + achievements);
    }

    function renderSkills() {
      setHtml("skills-display", Object.values(content.skills).map((category) => `
        <div>
          <div class="scb-header"><div class="scb-title">${escapeHtml(category.label)}</div><div class="scb-line"></div></div>
          <div class="scb-pills">${category.items.map((skill) => `<span class="skill-pill"><span class="dot ${category.dot}"></span>${escapeHtml(skill)}</span>`).join("")}</div>
        </div>
      `).join(""));
    }

    function renderContact() {
      setHtml("contact-heading", escapeHtml(content.contact.heading).replace(/\n/g, "<br>"));
      document.getElementById("contact-bio").textContent = content.contact.bio;
      setHtml("contact-actions", `
        <a href="mailto:${escapeHtml(content.contact.email)}" class="btn btn-primary">Email me -></a>
        <a href="${escapeHtml(content.contact.github)}" target="_blank" rel="noreferrer" class="btn btn-ghost">GitHub</a>
        <a href="${escapeHtml(content.contact.linkedin)}" target="_blank" rel="noreferrer" class="btn btn-ghost">LinkedIn</a>
      `);
      document.getElementById("footer-left").textContent = content.contact.footer;
    }

    function navigate(page) {
      if (!document.getElementById("page-" + page)) return;
      currentPage = page;
      document.querySelectorAll(".page").forEach((section) => section.classList.remove("active"));
      document.getElementById("page-" + page).classList.add("active");
      closeMenu();
      updateActiveNav();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function updateActiveNav() {
      document.querySelectorAll(".nav-links button").forEach((button) => {
        button.classList.toggle("active", button.dataset.nav === currentPage);
      });
    }

    function toggleMenu() {
      const hamburger = document.getElementById("hamburger");
      const menu = document.getElementById("mobile-menu");
      const open = !menu.classList.contains("open");
      menu.classList.toggle("open", open);
      hamburger.classList.toggle("open", open);
      hamburger.setAttribute("aria-expanded", String(open));
    }

    function closeMenu() {
      document.getElementById("mobile-menu").classList.remove("open");
      document.getElementById("hamburger").classList.remove("open");
      document.getElementById("hamburger").setAttribute("aria-expanded", "false");
    }

    function buildCommandItems() {
      commandItems = [
        { icon: "01", title: "Home", sub: "Return to the intro", kind: "Page", action: () => navigate("home") },
        ...navItems.map(([key, label], index) => ({
          icon: String(index + 2).padStart(2, "0"),
          title: label,
          sub: "Jump to " + label.toLowerCase(),
          kind: "Page",
          action: () => navigate(key)
        })),
        ...content.projects.map((project) => ({
          icon: project.icon,
          title: project.title,
          sub: project.tags.join(" · "),
          kind: "Project",
          action: () => {
            projectSearch = project.title;
            document.getElementById("project-search").value = projectSearch;
            activeProjectTag = "All";
            navigate("projects");
            renderProjectFilters();
            renderProjects();
          }
        })),
        ...Object.values(content.skills).flatMap((category) => category.items.map((skill) => ({
          icon: "•",
          title: skill,
          sub: category.label,
          kind: "Skill",
          action: () => navigate("skills")
        }))),
        { icon: "◐", title: "Toggle theme", sub: "Switch light/dark mode", kind: "Action", action: toggleTheme },
        ...(editorEnabled ? [{ icon: "✎", title: "Edit portfolio", sub: "Open the content editor", kind: "Action", action: openEditor }] : [])
      ];
    }

    function openCommandPalette() {
      activeCommandIndex = 0;
      document.getElementById("command-overlay").classList.add("open");
      document.getElementById("command-input").value = "";
      renderCommandList();
      setTimeout(() => document.getElementById("command-input").focus(), 0);
    }

    function closeCommandPalette() {
      document.getElementById("command-overlay").classList.remove("open");
    }

    function renderCommandList() {
      const query = document.getElementById("command-input").value.trim().toLowerCase();
      const filtered = commandItems.filter((item) => [item.title, item.sub, item.kind].join(" ").toLowerCase().includes(query)).slice(0, 12);
      activeCommandIndex = Math.min(activeCommandIndex, Math.max(filtered.length - 1, 0));
      document.getElementById("command-list").innerHTML = filtered.length ? filtered.map((item, index) => `
        <button class="command-item ${index === activeCommandIndex ? "active" : ""}" type="button" data-command-index="${index}">
          <span class="command-icon">${escapeHtml(item.icon)}</span>
          <span><span class="command-title">${escapeHtml(item.title)}</span><br><span class="command-sub">${escapeHtml(item.sub)}</span></span>
          <span class="command-kind">${escapeHtml(item.kind)}</span>
        </button>
      `).join("") : '<div class="empty-state">No commands found.</div>';
      document.querySelectorAll("[data-command-index]").forEach((button) => {
        button.addEventListener("click", () => runCommand(Number(button.dataset.commandIndex)));
      });
    }

    function runCommand(index = activeCommandIndex) {
      const query = document.getElementById("command-input").value.trim().toLowerCase();
      const filtered = commandItems.filter((item) => [item.title, item.sub, item.kind].join(" ").toLowerCase().includes(query)).slice(0, 12);
      const item = filtered[index];
      if (!item) return;
      closeCommandPalette();
      item.action();
    }

    function applyTheme(theme) {
      const isDark = theme === "dark";
      document.body.classList.toggle("theme-dark", isDark);
      document.getElementById("theme-toggle").textContent = isDark ? "☼" : "◐";
      localStorage.setItem("giri-portfolio-theme", theme);
    }

    function toggleTheme() {
      applyTheme(document.body.classList.contains("theme-dark") ? "light" : "dark");
    }

    function renderEditor() {
      const tabs = document.getElementById("editor-tabs");
      tabs.innerHTML = editorTabs.map(([key, label], index) => `
        <button class="editor-tab ${index === 0 ? "active" : ""}" type="button" data-editor-tab="${key}">${label}</button>
      `).join("");
      tabs.querySelectorAll("[data-editor-tab]").forEach((tab) => {
        tab.addEventListener("click", () => switchEditorTab(tab.dataset.editorTab));
      });

      renderBasicsEditor();
      renderProjectsEditor();
      renderSkillsEditor();
      renderJsonEditor();
    }

    function switchEditorTab(tabName) {
      document.querySelectorAll(".editor-tab").forEach((tab) => tab.classList.toggle("active", tab.dataset.editorTab === tabName));
      document.querySelectorAll(".editor-section").forEach((section) => section.classList.toggle("active", section.id === "editor-" + tabName));
      if (tabName === "json") renderJsonEditor();
    }

    function field(label, path, value, rows = 1) {
      const id = "field-" + path.join("-");
      const valueText = value ?? "";
      const input = rows > 1
        ? `<textarea id="${id}" rows="${rows}" data-path="${path.join(".")}">${escapeHtml(valueText)}</textarea>`
        : `<input id="${id}" value="${escapeHtml(valueText)}" data-path="${path.join(".")}">`;
      return `<div class="field"><label for="${id}">${label}</label>${input}</div>`;
    }

    function renderBasicsEditor() {
      setHtml("editor-basics", `
        ${field("Eyebrow", ["hero", "eyebrow"], content.hero.eyebrow)}
        ${field("Heading line 1", ["hero", "title1"], content.hero.title1)}
        ${field("Heading line 2", ["hero", "title2"], content.hero.title2)}
        ${field("Heading line 3", ["hero", "title3"], content.hero.title3)}
        ${field("Subtitle", ["hero", "subtitle"], content.hero.subtitle, 3)}
        ${field("About heading", ["about", "heading"], content.about.heading, 2)}
        ${field("About paragraph 1", ["about", "p1"], content.about.p1, 4)}
        ${field("About paragraph 2", ["about", "p2"], content.about.p2, 4)}
        ${field("Contact heading", ["contact", "heading"], content.contact.heading, 2)}
        ${field("Contact bio", ["contact", "bio"], content.contact.bio, 4)}
        ${field("Email", ["contact", "email"], content.contact.email)}
        ${field("GitHub URL", ["contact", "github"], content.contact.github)}
        ${field("LinkedIn URL", ["contact", "linkedin"], content.contact.linkedin)}
        ${field("Footer", ["contact", "footer"], content.contact.footer)}
      `);
      wirePathInputs(document.getElementById("editor-basics"));
    }

    function renderProjectsEditor() {
      const html = content.projects.map((project, index) => `
        <div class="edit-card">
          <div class="edit-card-head">
            <div class="edit-card-title">Project ${index + 1}</div>
            <button class="danger" type="button" data-remove-project="${index}">Remove</button>
          </div>
          ${field("Icon", ["projects", index, "icon"], project.icon)}
          ${field("Title", ["projects", index, "title"], project.title)}
          ${field("Description", ["projects", index, "desc"], project.desc, 3)}
          ${field("Tags, comma separated", ["projects", index, "tags"], project.tags.join(", "))}
          ${field("Link", ["projects", index, "link"], project.link)}
          <label class="mini-label"><input type="checkbox" data-featured-project="${index}" ${project.featured ? "checked" : ""}> Featured</label>
        </div>
      `).join("");

      setHtml("editor-projects", html + '<button class="add-button" type="button" id="add-project">+ Add project</button>');
      wirePathInputs(document.getElementById("editor-projects"));
      document.querySelectorAll("[data-remove-project]").forEach((button) => {
        button.addEventListener("click", () => {
          content.projects.splice(Number(button.dataset.removeProject), 1);
          renderProjectsEditor();
          renderProjects();
          setEditorStatus("Project removed. Click Save Changes when ready.");
        });
      });
      document.querySelectorAll("[data-featured-project]").forEach((checkbox) => {
        checkbox.addEventListener("change", () => {
          content.projects[Number(checkbox.dataset.featuredProject)].featured = checkbox.checked;
          renderProjects();
        });
      });
      document.getElementById("add-project").addEventListener("click", () => {
        content.projects.push({ icon: "🔹", title: "New Project", desc: "Project description.", tags: ["Tag"], link: "#", featured: false });
        renderProjectsEditor();
        renderProjects();
      });
    }

    function renderSkillsEditor() {
      const html = Object.entries(content.skills).map(([key, category]) => `
        <div class="edit-card">
          ${field(`${category.label} skills`, ["skills", key, "items"], category.items.join(", "), 3)}
        </div>
      `).join("");
      setHtml("editor-skills", html);
      wirePathInputs(document.getElementById("editor-skills"));
    }

    function renderJsonEditor() {
      setHtml("editor-json", `
        <div class="field">
          <label for="full-json">Full content JSON</label>
          <textarea class="json-editor" id="full-json" spellcheck="false">${escapeHtml(JSON.stringify(content, null, 2))}</textarea>
        </div>
        <button class="add-button" type="button" id="apply-json">Apply JSON</button>
      `);
      document.getElementById("apply-json").addEventListener("click", () => {
        try {
          content = JSON.parse(document.getElementById("full-json").value);
          renderAll();
          renderEditor();
          setEditorStatus("JSON applied. Click Save Changes to keep it.");
        } catch (error) {
          setEditorStatus("JSON error: " + error.message, true);
        }
      });
    }

    function wirePathInputs(root) {
      root.querySelectorAll("[data-path]").forEach((input) => {
        input.addEventListener("input", () => {
          const path = input.dataset.path.split(".").map((part) => /^\d+$/.test(part) ? Number(part) : part);
          let value = input.value;
          if (path[path.length - 1] === "tags" || path[path.length - 1] === "items") {
            value = value.split(",").map((item) => item.trim()).filter(Boolean);
          }
          setAtPath(content, path, value);
          renderAll();
          setEditorStatus("Editing...");
        });
      });
    }

    function setAtPath(object, path, value) {
      let target = object;
      path.slice(0, -1).forEach((key) => {
        target = target[key];
      });
      target[path[path.length - 1]] = value;
    }

    function openEditor() {
      enableEditorMode();
      renderEditor();
      document.getElementById("editor-overlay").classList.add("open");
      document.getElementById("editor-panel").classList.add("open");
    }

    function enableEditorMode() {
      editorEnabled = true;
      document.body.classList.add("editor-enabled");
      buildCommandItems();
    }

    function closeEditor() {
      document.getElementById("editor-overlay").classList.remove("open");
      document.getElementById("editor-panel").classList.remove("open");
    }

    function setEditorStatus(message, isError = false) {
      const status = document.getElementById("editor-status");
      status.textContent = message;
      status.style.color = isError ? "var(--danger)" : "var(--muted)";
    }

    function saveLocal() {
      writeStoredContent();
      setEditorStatus("Saved in this browser.");
    }

    function downloadHtml() {
      writeStoredContent();
      const html = "<!doctype html>\n" + document.documentElement.outerHTML;
      const blob = new Blob([html], { type: "text/html;charset=utf-8" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "index.html";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(link.href);
      setEditorStatus("Downloaded index.html.");
    }

    function exportJson() {
      const blob = new Blob([JSON.stringify(content, null, 2)], { type: "application/json;charset=utf-8" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "portfolio-content.json";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(link.href);
      setEditorStatus("Exported content JSON.");
    }

    function resetContent() {
      if (!confirm("Reset edits saved in this browser?")) return;
      localStorage.removeItem(storageKey);
      content = JSON.parse(document.getElementById("portfolio-data").textContent);
      renderAll();
      renderEditor();
      setEditorStatus("Reset to the file's built-in content.");
    }

    const params = new URLSearchParams(window.location.search);
    if (params.get("edit") === "true") {
      enableEditorMode();
    }

    renderShell();
    applyTheme(localStorage.getItem("giri-portfolio-theme") || "light");
    renderAll();

    document.getElementById("hamburger").addEventListener("click", toggleMenu);
    document.getElementById("theme-toggle").addEventListener("click", toggleTheme);
    document.getElementById("command-open").addEventListener("click", openCommandPalette);
    document.getElementById("command-overlay").addEventListener("click", (event) => {
      if (event.target.id === "command-overlay") closeCommandPalette();
    });
    document.getElementById("command-input").addEventListener("input", () => {
      activeCommandIndex = 0;
      renderCommandList();
    });
    document.getElementById("command-input").addEventListener("keydown", (event) => {
      const items = document.querySelectorAll(".command-item");
      if (event.key === "ArrowDown") {
        event.preventDefault();
        activeCommandIndex = Math.min(activeCommandIndex + 1, items.length - 1);
        renderCommandList();
      }
      if (event.key === "ArrowUp") {
        event.preventDefault();
        activeCommandIndex = Math.max(activeCommandIndex - 1, 0);
        renderCommandList();
      }
      if (event.key === "Enter") {
        event.preventDefault();
        runCommand();
      }
      if (event.key === "Escape") closeCommandPalette();
    });
    document.getElementById("project-search").addEventListener("input", (event) => {
      projectSearch = event.target.value;
      renderProjects();
    });
    document.getElementById("edit-toggle").addEventListener("click", openEditor);
    document.getElementById("editor-close").addEventListener("click", closeEditor);
    document.getElementById("editor-overlay").addEventListener("click", closeEditor);
    document.getElementById("save-local").addEventListener("click", saveLocal);
    document.getElementById("download-html").addEventListener("click", downloadHtml);
    document.getElementById("export-json").addEventListener("click", exportJson);
    document.getElementById("reset-content").addEventListener("click", resetContent);
    document.addEventListener("keydown", (event) => {
      const target = event.target;
      const isTyping = target && ["INPUT", "TEXTAREA"].includes(target.tagName);
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "k") {
        event.preventDefault();
        openCommandPalette();
      }
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "e") {
        event.preventDefault();
        openEditor();
      }
      if ((event.ctrlKey || event.metaKey) && event.shiftKey && event.key.toLowerCase() === "e") {
        event.preventDefault();
        enableEditorMode();
        setEditorStatus("Editor button enabled for this page view.");
      }
      if (event.key === "Escape") {
        closeCommandPalette();
        if (!isTyping) closeEditor();
      }
      if (!isTyping && event.key === "/") {
        event.preventDefault();
        navigate("projects");
        document.getElementById("project-search").focus();
      }
    });

    if (params.get("edit") === "true") {
      openEditor();
    }
  </script>
</body>
</html>
